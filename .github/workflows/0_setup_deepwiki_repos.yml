name: 0 Setup DeepWiki Repos

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Plan repo creation without creating/pushing"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  setup:
    runs-on: ubuntu-latest
    env:
      KEY_JSON: ${{ secrets.KEY_JSON }}
      SETUP_SLEEP_SECONDS: "0"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Setup rotating DeepWiki repos
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            python3 setup/deepwiki_setup.py --dry-run
          else
            python3 setup/deepwiki_setup.py
          fi
      - name: Commit repository URL list
        if: inputs.dry_run != 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No repository URL changes to commit"
          else
            git commit -m "Setup DeepWiki repo rotation"
            git pull --rebase origin master
            git push origin master
          fi
