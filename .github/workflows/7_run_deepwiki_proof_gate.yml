name: 7 Run DeepWiki Proof Gate

on:
  workflow_dispatch:
    inputs:
      smoke_limit:
        description: "Optional small-run limit"
        required: false
        default: ""
      chain_next:
        description: "Verify output and dispatch next workflow"
        required: false
        default: "false"

permissions:
  contents: write
  actions: write

jobs:
  proof-gate:
    runs-on: ubuntu-latest
    env:
      BOT_SMOKE_LIMIT: ${{ inputs.smoke_limit }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Build proof-gate pending queue
        run: python3 run_generate_proof_gate_pending.py
      - name: Submit DeepWiki proof-gate prompts
        run: python3 run_deepwiki_submit.py --stage proof_gate
      - name: Commit outputs
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --cached --quiet; then
            echo "No proof gate changes to commit"
          else
            git commit -m "Auto-update: DeepWiki proof gate submissions"
            git pull --rebase origin master
            git push origin master
          fi
      - name: Verify and advance chain
        if: inputs.chain_next == 'true'
        env:
          PAT_TOKEN: ${{ secrets.PAT_JSON || secrets.PAT_TOKEN }}
        run: python3 workflow_chain.py advance --stage 7 --same-workflow 7_run_deepwiki_proof_gate.yml --next-workflow 8_collect_proof_gate_and_export.yml --smoke-limit "${{ inputs.smoke_limit }}"
